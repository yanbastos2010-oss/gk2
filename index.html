<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    
    <!-- DNS Prefetch and Preconnect to external resources for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.utmify.com.br" />
    <link rel="preconnect" href="https://i.ibb.co" />
    <link rel="dns-prefetch" href="https://i.ibb.co" />
    
    <!-- Preload Hero Image to improve LCP (Largest Contentful Paint) -->
    <link rel="preload" as="image" href="https://i.ibb.co/Qjx0XrXb/Untitled-design-7.webp" fetchpriority="high" />
    
    <!-- Optimized Google Fonts stylesheet replacement of CSS @import blocks -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <script>
      window.pixelId = "6a1247548c21a0274f164363";
    </script>
    <script
      src="https://cdn.utmify.com.br/scripts/pixel/pixel.js"
      async
      defer
    ></script>
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
